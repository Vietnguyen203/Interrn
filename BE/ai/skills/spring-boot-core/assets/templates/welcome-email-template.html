<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            text-align: center;
        }

        .account-info {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .credential {
            font-size: 18px;
            font-weight: bold;
            color: #1a73e8;
            margin: 10px 0;
        }

        .note {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Chào mừng bạn đến với hệ thống!</h2>
    <p>Tài khoản của bạn đã được tạo thành công.</p>

    <div class="account-info">
        <p><strong>Thông tin đăng nhập:</strong></p>
        <div class="credential">
            Tài khoản: <span th:text="${user_code}">username</span>
        </div>
        <div class="credential">
            Mật khẩu: <span th:text="${password}">password</span>
        </div>
    </div>

    <p>
        <a th:href="${loginUrl}"
           style="display:inline-block;
              padding:10px 20px;
              background-color:#1a73e8;
              color:#fff;
              text-decoration:none;
              border-radius:5px;">
            Đăng nhập ngay
        </a>
    </p>
</div>
</body>
</html>
