server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      
      routes:
        # 1. Order Service (8082)
        - id: order_route
          uri: http://localhost:8082
          predicates:
            - Path=/order/**
          filters:
            - RewritePath=/order/(?<segment>.*), /$\{segment}

        # 2. Table Service - WebSocket
        - id: ws_table_route
          uri: http://localhost:8083
          predicates:
            - Path=/ws-tables/**

        # 2. Table Service (8083)
        - id: table_route
          uri: http://localhost:8083
          predicates:
            - Path=/api/tables/**
          filters:
            - RewritePath=/api/(?<segment>.*), /$\{segment}

        # 3. Catalog Service (8081)
        - id: catalog_route
          uri: http://localhost:8081
          predicates:
            - Path=/catalog/**
          filters:
            - RewritePath=/catalog/(?<segment>.*), /$\{segment}

        # 4. Payment Service (8085)
        - id: payment_route
          uri: http://localhost:8085
          predicates:
            - Path=/payment/**
          filters:
            - RewritePath=/payment/(?<segment>.*), /$\{segment}

        # 5. Users Service (8087)
        - id: user_route
          uri: http://localhost:8087
          predicates:
            - Path=/api/users-service/**
          filters:
            # Sửa lại regex để xử lý cả trường hợp segment trống
            - RewritePath=/api/users-service/?(?<segment>.*), /users-service/request/$\{segment}

        # 6. Notification Service - WebSocket
        - id: ws_notification_route
          uri: http://localhost:8086
          predicates:
            - Path=/ws-notifications/**

        # 7. Notification Service (8086)
        - id: notification_route
          uri: http://localhost:8086
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /notifications/$\{segment}

logging:
  level:
    org.springframework.cloud.gateway: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
