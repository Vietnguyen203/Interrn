# ======================
# Server (HTTP only)
# ======================
server.port=9720
server.servlet.context-path=/foodordersystem/api
server.max-http-header-size=10000000

# ======================
# JWT
# ======================
# CHANGE THIS SECRET TO A RANDOM STRING >= 32 BYTES (single line, no trailing spaces)
jwt.secret=THIS_IS_A_SAMPLE_DEV_SECRET_64_CHARS_LONG_1234567890abcdefABCDEF_XYZ_DO_NOT_USE_IN_PROD
jwt.expiration=86400000
jwt.clockSkewSec=60

# ======================
# Oracle & JPA
# ======================
spring.datasource.url=jdbc:oracle:thin:@localhost:1522/XEPDB1
spring.datasource.username=Food_Order
spring.datasource.password=Ab@123456
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect

# ======================
# Liquibase
# ======================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# ======================
# File Upload (served under /foodordersystem/api/uploads/**)
# ======================
app.host=${APP_HOST:localhost}
file.upload-dir=uploads
file.base-url=http://${app.host}:${server.port}${server.servlet.context-path}/uploads/

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

spring.web.resources.static-locations=file:${file.upload-dir}/
spring.mvc.static-path-pattern=/uploads/**

# ======================
# Logging
# ======================
logging.level.org.springframework.security=DEBUG
logging.level.com.manager.account=DEBUG
logging.level.com.manager.account.utils=DEBUG
logging.file.name=logs/myapp.log
server.error.include-message=always

# ======================
# JSON
# ======================
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.time-zone=Asia/Bangkok
spring.jackson.deserialization.fail-on-unknown-properties=false

# ======================
# Springfox (if used)
# ======================
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# ======================
# Mail (Gmail SMTP) — thay YOUR_GMAIL và YOUR_APP_PASSWORD
# ======================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=nguyenlanviet09@gmail.com
spring.mail.password=hfoacfygiiqfxnmm
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OTP time-to-live (giây) — mặc định 300s = 5 phút
app.otp.ttl-seconds=300
